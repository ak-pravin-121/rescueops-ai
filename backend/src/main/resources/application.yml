server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: rescueops-ai-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:rescueops}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false

  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    # IMPORTANT: override JWT_SECRET in production with: openssl rand -base64 32
    secret: ${JWT_SECRET:x04nPy6XDqOQoM0KO616EIIJXGX2YJMStoaFNvl4pfc=}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000} # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  embedding-model: ${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
  api-base-url: ${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.rescueops: DEBUG
