databases:
  - name: rescueops-db
    plan: free
    databaseName: rescueops
    user: rescueops

services:
  # ---------------------------------------------------------------------
  # Backend - Spring Boot API, built from backend/Dockerfile
  # ---------------------------------------------------------------------
  - type: web
    name: rescueops-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: rescueops-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: rescueops-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: rescueops-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: rescueops-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: rescueops-db
          property: password

      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "604800000"

      - key: DDL_AUTO
        value: update
      - key: SHOW_SQL
        value: "false"

      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001

      # Fill this in with your deployed frontend's URL after the first deploy
      # (e.g. https://rescueops-frontend.onrender.com) - see README for details.
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # ---------------------------------------------------------------------
  # Frontend - static React build, served from frontend/dist
  # ---------------------------------------------------------------------
  - type: web
    name: rescueops-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      # Fill these in with your deployed backend's URL after the first deploy
      # (e.g. https://rescueops-backend.onrender.com/api and .../) - see README.
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_WS_BASE_URL
        sync: false
    routes:
      # Required for React Router: any path not matching a real static file
      # falls back to index.html so client-side routing works on refresh/direct links.
      - type: rewrite
        source: /*
        destination: /index.html
